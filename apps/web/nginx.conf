# =============================================================================
# CC Scale Web Nginx Configuration
# High-performance caching and security settings for Next.js app
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main ' -  [] "" '
                    '  "" '
                    '"" "" '
                    'rt= uct="" '
                    'uht="" urt=""';
    
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Brotli compression (better than gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types text/plain text/css text/xml text/javascript 
                 application/json application/javascript application/xml+rss 
                 application/rss+xml font/truetype font/opentype
                 application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting zones
    limit_req_zone  zone=general:10m rate=10r/s;
    limit_req_zone  zone=api:10m rate=50r/s;
    limit_conn_zone  zone=addr:10m;

    # Upstream backend
    upstream nextjs {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name www.ccscale.com ccscale.com;
        return 301 https://www.ccscale.com;
    }

    server {
        listen 443 ssl http2;
        server_name www.ccscale.com ccscale.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options ""SAMEORIGIN"" always;
        add_header X-Content-Type-Options ""nosniff"" always;
        add_header X-XSS-Protection ""1; mode=block"" always;
        add_header Referrer-Policy ""strict-origin-when-cross-origin"" always;
        add_header Permissions-Policy ""camera=(), microphone=(), geolocation=()"" always;
        add_header Strict-Transport-Security ""max-age=31536000; includeSubDomains"" always;

        # Custom headers
        add_header X-Cache-Status  always;
        add_header X-Request-ID  always;

        # Gzip pre-compression for static assets
        gzip_vary on;

        # Root directory
        root /var/www/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 ""healthy\n"";
            add_header Content-Type text/plain;
        }

        # Static assets - aggressive caching
        location /_next/static {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 60m;
            expires 1y;
            add_header Cache-Control ""public, immutable"";
            access_log off;
        }

        # Images - long cache
        location /images {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 30d;
            expires 30d;
            add_header Cache-Control ""public"";
        }

        # SVG assets
        location ~* \.(svg|ico)$ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control ""public"";
        }

        # CSS and JS
        location ~* \.(css|js)$ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 60m;
            expires 6h;
            add_header Cache-Control ""public"";
        }

        # Fonts
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 1y;
            expires 1y;
            add_header Cache-Control ""public, immutable"";
        }

        # API proxy with rate limiting
        location /api {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 10;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade ;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header X-Real-IP ;
            proxy_set_header X-Forwarded-For ;
            proxy_set_header X-Forwarded-Proto ;
            proxy_cache_bypass ;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # uploads proxy with rate limiting
        location /uploads {
            limit_req zone=general burst=5 nodelay;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
            proxy_set_header X-Real-IP ;
            proxy_set_header X-Forwarded-For ;
            
            # Increase body size limit for file uploads
            client_max_body_size 10M;
        }

        # Main app - dynamic content
        location / {
            limit_req zone=general burst=10 nodelay;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade ;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
            proxy_cache_bypass ;
            
            # Performance headers
            proxy_set_header X-Real-IP ;
            proxy_set_header X-Forwarded-For ;
            proxy_set_header X-Forwarded-Proto ;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
        }
    }
}