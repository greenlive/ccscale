[build]
builder = "NIXPACKS"
buildCommand = "npm run db:generate && npx turbo run build --filter=@cc-scale/api"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

# Railway Pro: enable zero-downtime deploys
[deploy.lifecycle]
type = "BUILD"

# Region pinned to EU for GDPR-friendly B2B data
# Set region via RAILWAY_REGION env var: "eu-west" (Amsterdam) or "eu-central" (Frankfurt)
