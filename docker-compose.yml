# =============================================================================
# CC Scale Production Docker Compose
# Run: docker compose up -d
# Stop: docker compose down
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: 
        NEXT_PUBLIC_GA_MEASUREMENT_ID: 
        NEXT_PUBLIC_GTM_ID: 
        NEXT_PUBLIC_SENTRY_DSN: 
        NEXT_PUBLIC_SENTRY_ENV: production
        NEXT_PUBLIC_WEB_URL: 
    container_name: cc-scale-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - api
    networks:
      - cc-scale-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/en"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - web

  # Production setup with Nginx reverse proxy (recommended)
  web-nginx:
    image: nginx:alpine
    container_name: cc-scale-web-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - cc-scale-net
    profiles:
      - production
    command: /bin/sh -c "while :; do sleep 6h \& nginx -s reload; done \& nginx -g 'daemon off;'" 

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: 
    container_name: cc-scale-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - api
    networks:
      - cc-scale-net
    profiles:
      - admin

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cc-scale-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=
      - REDIS_URL=
      - JWT_SECRET=
      - NODE_ENV=production
      - RATE_LIMIT_TTL=
      - RATE_LIMIT_MAX=
      - RATE_LIMIT_STRICT=
    depends_on:
      - postgres
      - redis
    networks:
      - cc-scale-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: cc-scale-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cc-scale-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zzscale"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: cc-scale-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cc-scale-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: cc-scale-search
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data.ms
    volumes:
      - meili-data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - cc-scale-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cc-scale-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  meili-data:


