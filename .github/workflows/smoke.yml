name: smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC (smoke against production)
    - cron: "0 6 * * *"

jobs:
  smoke-api-prod:
    name: API smoke (production)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke against production
        env:
          SMOKE_API: https://api.zzscale.com
          SMOKE_WEB: https://www.zzscale.com
        run: node scripts/smoke/smoke.mjs

      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure
          path: |
            scripts/smoke/smoke.mjs
            scripts/smoke/README.md
          retention-days: 7

  smoke-api-staging:
    name: API smoke (preview)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke against Vercel preview
        env:
          # ${{ steps.deploy.outputs.url }} from a previous deploy step if used
          SMOKE_API: ${{ vars.PREVIEW_API_URL || 'https://api-staging.zzscale.com' }}
          SMOKE_WEB: ${{ vars.PREVIEW_WEB_URL || 'https://staging.zzscale.com' }}
        run: node scripts/smoke/smoke.mjs